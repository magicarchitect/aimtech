<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&amp;family=Geist:wght@300;600&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
      
      .brand-name {
        font-family: 'Instrument Serif', serif;
        font-style: italic;
        font-size: 84px;
        fill: #FFFFFF;
      }
      
      .brand-highlight {
        fill: #2575FC; /* El azul corporativo brillante de tu web */
      }
      
      .brand-sub {
        font-family: 'Geist', sans-serif;
        font-weight: 600;
        font-size: 18px;
        letter-spacing: 0.55em;
        fill: #70A1FF; /* Azul secundario más claro para legibilidad */
        opacity: 0.9;
      }
      
      .tech-dot {
        fill: #2575FC;
      }
    </style>
  </defs>

  <g transform="translate(300, 110)" text-anchor="middle">
    <text class="brand-name" y="0">
      Aim<tspan class="brand-highlight">tech</tspan>
    </text>
    
    <circle class="tech-dot" cx="152" cy="-15" r="5" />
    
    <text class="brand-sub" y="55" x="4">CONSULTING</text>
  </g>
</svg>
