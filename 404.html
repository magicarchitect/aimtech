<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Página no encontrada | Aimtech</title>
<meta name="robots" content="noindex" />

<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/fonts.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/cookie-consent.css">
<script src="/js/cookie-consent.js" defer></script>

<link rel="icon" type="image/x-icon" href="/assets/logo.ico" />
<link rel="icon" type="image/png" href="/assets/logo.png" />

<style>
  .error-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
    position: relative;
    z-index: 2;
  }
  .error-code {
    font-family: var(--mono); font-size: 12px;
    color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.2em;
    margin-bottom: 32px;
    display: flex; align-items: center; gap: 12px;
  }
  .error-code::before { content: ''; width: 24px; height: 1px; background: var(--accent); }
  .error-code::after { content: ''; width: 24px; height: 1px; background: var(--accent); }
  .error-title {
    font-family: var(--serif);
    font-size: clamp(56px, 10vw, 140px);
    font-weight: 400; line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 28px;
  }
  .error-title em { font-style: italic; color: var(--accent); }
  .error-sub {
    color: var(--ink-dim); font-size: 18px; line-height: 1.55;
    margin-bottom: 48px;
    max-width: 480px;
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="noise"></div>

<main class="error-page">
  <div class="error-code">error · 404</div>
  <h1 class="error-title">Esta página <em>no existe</em>.</h1>
  <p class="error-sub">Quizá el link es antiguo, o se coló una letra al escribirlo. Vuelve al inicio y desde ahí encuentras lo que buscabas.</p>
  <a href="/" class="btn-primary">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M13 7H1M1 7L7 13M1 7L7 1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    Volver al inicio
  </a>
</main>

</body>
</html>
