<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{TITLE}} | Blog Aimtech</title>
<meta name="description" content="{{DESCRIPTION}}" />

<link rel="canonical" href="{{CANONICAL_URL}}" />

<!-- hreflang: variantes de idioma -->
<link rel="alternate" hreflang="es" href="{{HREFLANG_ES}}" />
<link rel="alternate" hreflang="ca" href="{{HREFLANG_CA}}" />
<link rel="alternate" hreflang="x-default" href="{{HREFLANG_ES}}" />

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/assets/logo.ico?v=2" />
<link rel="icon" type="image/png" href="/assets/logo.png?v=2" />
<link rel="apple-touch-icon" href="/assets/logo.png?v=2" />

<!-- Open Graph -->
<meta property="og:type" content="article" />
<meta property="og:locale" content="es_ES" />
<meta property="og:locale:alternate" content="ca_ES" />
<meta property="og:site_name" content="Aimtech" />
<meta property="og:title" content="{{TITLE}}" />
<meta property="og:description" content="{{DESCRIPTION}}" />
<meta property="og:url" content="{{CANONICAL_URL}}" />
<meta property="og:image" content="{{OG_IMAGE}}" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="{{TITLE}}" />
<meta property="article:published_time" content="{{DATE_ISO}}" />
<meta property="article:author" content="{{AUTHOR}}" />

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{TITLE}}" />
<meta name="twitter:description" content="{{DESCRIPTION}}" />
<meta name="twitter:image" content="{{OG_IMAGE}}" />

<!-- JSON-LD: BlogPosting + BreadcrumbList -->
<script type="application/ld+json">
[
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{TITLE_JSON}}",
    "description": "{{DESCRIPTION_JSON}}",
    "datePublished": "{{DATE_ISO}}",
    "dateModified": "{{DATE_MODIFIED}}",
    "inLanguage": "es-ES",
    "keywords": {{TAGS_JSON}},
    "image": "{{OG_IMAGE}}",
    "url": "{{CANONICAL_URL}}",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{CANONICAL_URL}}"
    },
    "author": {
      "@type": "Person",
      "name": "{{AUTHOR_JSON}}",
      "url": "https://www.aimtech.es/sobre-mike/"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Aimtech",
      "url": "https://www.aimtech.es",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.aimtech.es/assets/logo.png?v=2"
      }
    }
  },
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Inicio", "item": "https://www.aimtech.es/" },
      { "@type": "ListItem", "position": 2, "name": "Blog", "item": "https://www.aimtech.es/blog/" },
      { "@type": "ListItem", "position": 3, "name": "{{TITLE_JSON}}", "item": "{{CANONICAL_URL}}" }
    ]
  }
]
</script>

<link rel="preload" href="/assets/fonts/instrument-serif-400-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/instrument-serif-400-italic-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/geist-400-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/jetbrains-mono-400-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/fonts.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/blog.css">
<link rel="stylesheet" href="/css/cookie-consent.css">
<script src="/js/cookie-consent.js" defer></script>
<script src="/js/site.js" defer></script>
</head>
<body class="is-post">

<div class="grid-bg"></div>
<div class="noise"></div>

<!-- @region partials/nav-es.html -->
<!-- @endregion -->

<main>

  <article class="post">
    <header class="post-header container">
      <a href="/blog/" class="post-back">← Blog</a>
      <div class="post-meta">
        <time datetime="{{DATE_ISO}}">{{DATE_DISPLAY}}</time>
        <span class="sep">·</span>
        <span>{{READING_TIME}} min de lectura</span>
        <span class="sep">·</span>
        <span>{{AUTHOR}}</span>
      </div>
      <h1>{{TITLE}}</h1>
      <p class="post-lead">{{DESCRIPTION}}</p>
      <div class="post-tags">{{TAGS_HTML}}</div>
    </header>

    <div class="post-body container">
      {{CONTENT_HTML}}
    </div>

    <footer class="post-footer container">
      <div class="post-related" aria-label="Recursos relacionados de Aimtech">
        <span class="post-footer-label">Siguiente paso</span>
        <div class="post-related-links">
          <a href="/curso-power-bi-empresas/">Curso Power BI empresas</a>
          <a href="/formacion-ia-empresas/">Formación IA empresas</a>
          <a href="/consultoria-ia-empresas/">Consultoría IA</a>
        </div>
      </div>
      <div class="post-footer-grid">
        <div>
          <span class="post-footer-label">Escrito por</span>
          <a href="/sobre-mike/" class="post-author">{{AUTHOR}}</a>
        </div>
        <div>
          <span class="post-footer-label">¿Te resuena?</span>
          <a href="/contacto/" class="post-cta">Hablemos sobre tu caso →</a>
        </div>
      </div>
    </footer>
  </article>

</main>

<!-- @region partials/footer-es.html -->
<!-- @endregion -->

</body>
</html>
