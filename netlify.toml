# Configuración as-code de Netlify para aimtech.es
# Sitio estático + functions. Publish root, functions en /netlify/functions.

[build]
  publish = "."
  # Resuelve los partials (footer-es/ca) en cada deploy.
  # Idempotente: si el HTML ya está al día, no toca nada.
  command = "node build.js"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Security headers ─────────────────────────────────
# Aplican a todas las respuestas. Mejora score en
# securityheaders.com y es señal SEO menor pero real.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Cache: HTML siempre revalida ─────────────────────
# Los HTML cambian con cada push. Cliente revalida con
# ETag/Last-Modified en cada request, transferencia mínima
# si no hay cambios (304 Not Modified).

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Caso especial: el index de la raíz (sin .html en URL).
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Endpoint del formulario: nunca cachear.
[[headers]]
  for = "/.netlify/functions/contact"
  [headers.values]
    Cache-Control = "no-store"

# Endpoint de la encuesta de feedback: nunca cachear.
[[headers]]
  for = "/.netlify/functions/feedback"
  [headers.values]
    Cache-Control = "no-store"

# Encuesta de feedback: herramienta interna para alumnos.
# noindex también por cabecera (refuerza el meta robots).
[[headers]]
  for = "/feedback/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/ca/feedback/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# ── Cache: CSS y XML medio (1 hora) ──────────────────
# CSS aún se itera; sitemap.xml puede actualizarse.

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ── Cache: assets binarios (1 año, immutable) ────────
# Fuentes (.woff2 con nombre único) y logo (?v=2) son
# inmutables: si cambian, cambia la URL. Cachear 1 año
# elimina re-descargas en visitas repetidas (mejor LCP/
# FCP). Las OG images las re-piden los crawlers, no la
# caché del usuario, así que no es problema.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirect: aimtech.es → www.aimtech.es ────────────
# Canónico = www.aimtech.es. Todas las URLs absolutas
# (canonical, sitemap, JSON-LD, OG) apuntan al www.
# force=true asegura que el redirect aplica incluso si
# el archivo existe en la raíz sin www.

[[redirects]]
  from = "https://aimtech.es/*"
  to = "https://www.aimtech.es/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://aimtech.es/*"
  to = "https://www.aimtech.es/:splat"
  status = 301
  force = true

# ── Limpieza del WordPress/WooCommerce antiguo ───────
# URLs heredadas de la web anterior que Google aún tiene
# indexadas (devuelven 404 hoy). Un 301 a la página real
# más cercana las des-indexa más rápido que un 404 y da
# buena UX a quien llegue por un enlace viejo. Ninguna de
# estas rutas existe en el sitio nuevo, así que no hay
# colisión con contenido actual.

# Páginas de servicios/about antiguas → home
[[redirects]]
  from = "/services"
  to = "/"
  status = 301
[[redirects]]
  from = "/services-two"
  to = "/"
  status = 301
[[redirects]]
  from = "/architect-design"
  to = "/"
  status = 301

# Tienda WooCommerce (ya no existe) → home
[[redirects]]
  from = "/product/*"
  to = "/"
  status = 301
[[redirects]]
  from = "/shop"
  to = "/"
  status = 301
[[redirects]]
  from = "/cart"
  to = "/"
  status = 301
[[redirects]]
  from = "/checkout"
  to = "/"
  status = 301
[[redirects]]
  from = "/my-account"
  to = "/"
  status = 301
[[redirects]]
  from = "/my-account-2"
  to = "/"
  status = 301

# Blog y taxonomías WP antiguas → blog nuevo / sobre-mike
[[redirects]]
  from = "/influencer-marketing-trends-2023"
  to = "/blog/"
  status = 301
[[redirects]]
  from = "/category/*"
  to = "/blog/"
  status = 301
[[redirects]]
  from = "/tag/*"
  to = "/blog/"
  status = 301
[[redirects]]
  from = "/author/*"
  to = "/sobre-mike/"
  status = 301

# Rutas de administración WP (sondeadas por bots) → home
[[redirects]]
  from = "/wp-admin/*"
  to = "/"
  status = 301
[[redirects]]
  from = "/wp-login.php"
  to = "/"
  status = 301
